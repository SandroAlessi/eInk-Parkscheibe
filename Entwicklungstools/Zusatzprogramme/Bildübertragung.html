<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pico ePaper Tool</title>

    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --accent: #e94560;
            --accent2: #533483;
            --text: #eee;
            --text-dim: #8899aa;
            --success: #00c853;
            --warning: #ffab00;
            --border: #2a3a5e;
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            gap: 12px;
        }

        h1 {
            font-size: 1.2em;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .toolbar {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            flex-wrap: wrap;
            max-width: 700px;
            align-items: center;
        }

        .toolbar .sep {
            width: 1px;
            height: 28px;
            background: var(--border);
            margin: 0 4px;
        }

        .toolbar label {
            font-size: 0.75em;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        button {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            font-size: 0.8em;
            font-weight: 500;
            padding: 5px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        button:hover {
            background: var(--accent2);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 12px rgba(233, 69, 96, 0.4);
        }

        button.send-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: #fff;
            font-weight: 600;
        }

        button.send-btn:hover {
            box-shadow: 0 0 16px rgba(233, 69, 96, 0.5);
        }

        button.send-btn.sending {
            animation: pulse 0.6s ease;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        input[type="text"] {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            font-size: 0.8em;
            padding: 5px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            width: 110px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        input[type="checkbox"] {
            accent-color: var(--accent);
        }

        .canvas-wrap {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            border: 2px solid var(--border);
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .statusbar {
            display: flex;
            gap: 16px;
            padding: 6px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.72em;
            color: var(--text-dim);
            max-width: 700px;
            width: 100%;
            justify-content: space-between;
        }

        .statusbar span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .statusbar .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
            display: inline-block;
        }

        .statusbar .dot.ok {
            background: var(--success);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            padding: 10px 20px;
            border-radius: var(--radius);
            font-size: 0.85em;
            font-weight: 500;
            color: #fff;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--accent);
        }

        .toast.info {
            background: var(--accent2);
        }

        .shortcuts {
            font-size: 0.7em;
            color: var(--text-dim);
            max-width: 700px;
            text-align: center;
        }

        .shortcuts kbd {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 1px 5px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <h1>⚡ Pico ePaper Tool</h1>

    <div class="shortcuts">
        <kbd>Del</kbd> Löschen &nbsp;
        <kbd>Ctrl+C</kbd> Kopieren &nbsp;
        <kbd>Ctrl+X</kbd> Ausschneiden &nbsp;
        <kbd>Ctrl+V</kbd> Einfügen &nbsp;
        <kbd>←↑↓→</kbd> Verschieben (1px)
    </div>

    <div class="toolbar" id="toolsBar">
        <button onclick="setTool('select')" id="btnSelect" title="Auswählen & Verschieben">🔲 Select</button>
        <button onclick="setTool('pen')" id="btnPen" class="active" title="Freihand zeichnen">✏️ Pen</button>
        <button onclick="setTool('eraser')" id="btnEraser" title="Radieren (nur Pixel)">🧹 Eraser</button>
        <div class="sep"></div>
        <button onclick="setTool('line')" id="btnLine" title="Vektor-Linie">📏 Line</button>
        <button onclick="setTool('rect')" id="btnRect" title="Vektor-Rechteck">⬜ Rect</button>
        <button onclick="setTool('circle')" id="btnCircle" title="Vektor-Kreis">⭕ Circle</button>
        <button onclick="setTool('placeholder')" id="btnPlaceholder" title="Koordinaten-Punkt">📍 Point</button>
    </div>

    <div class="toolbar" id="editBar" style="display:none;">
        <button onclick="deleteSelected()" title="Auswahl löschen">🗑️ Del</button>
        <button onclick="copySelected()" title="Kopieren">📋 Copy</button>
        <button onclick="cutSelected()" title="Ausschneiden">✂️ Cut</button>
        <button onclick="pasteShape()" title="Einfügen">📌 Paste</button>
        <div class="sep"></div>
        <button onclick="rotateSelected(45)" title="45° drehen">🔄 Rot</button>
        <button onclick="scaleSelected(1.01)" title="Vergrößern (1%)">➕</button>
        <button onclick="scaleSelected(0.99)" title="Verkleinern (1%)">➖</button>
        <div class="sep"></div>
        <button onclick="pixelateSelected()" title="Vektor → Pixel">🧱 Pixelieren</button>
    </div>

    <div class="toolbar">
        <button onclick="undo()" title="Rückgängig">↩️ Undo</button>
        <button onclick="clearAll()" title="Alles löschen">🧨 Clear</button>
        <div class="sep"></div>
        <input type="file" id="imgUpload" accept="image/*" style="display:none" onchange="handleImageUpload(this)">
        <button onclick="document.getElementById('imgUpload').click()" title="Bild hochladen">🖼️ Upload</button>
        <div class="sep"></div>
        <input type="text" id="deviceIp" value="192.168.4.1" placeholder="Pico IP">
        <button onclick="uploadToDevice()" class="send-btn" id="btnSend" title="An Display senden">📡 Send</button>
        <label title="Automatisch senden"><input type="checkbox" id="chkAutoSend"> Live</label>
        <div class="sep"></div>
        <button onclick="downloadPy()" title="Python-Code exportieren">🐍 .py</button>
    </div>

    <div class="canvas-wrap">
        <canvas id="canvas" width="480" height="280"></canvas>
    </div>

    <div class="statusbar">
        <span id="statusTool">🔧 Pen</span>
        <span id="statusCoords">📐 0, 0</span>
        <span id="statusScale" style="display:none">🔍 100%</span>
        <span id="statusInfo">📦 0 Shapes</span>
        <span><span class="dot" id="statusDot"></span> <span id="statusMsg">Bereit</span></span>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        const WIDTH = 480, HEIGHT = 280;

        // --- State ---
        const rasterCanvas = document.createElement('canvas');
        rasterCanvas.width = WIDTH; rasterCanvas.height = HEIGHT;
        const rCtx = rasterCanvas.getContext('2d');
        rCtx.imageSmoothingEnabled = false;
        rCtx.fillStyle = "white"; rCtx.fillRect(0, 0, WIDTH, HEIGHT);

        let rasterHistory = [];
        let shapes = [];
        let selectedIdx = -1;
        let clipboard = null;
        let painting = false;
        let dragging = false;
        let marqDrag = false;
        let dragHandle = null;
        let tool = 'pen';
        let startPos = { x: 0, y: 0 };
        let lastPos = { x: 0, y: 0 };

        const cursors = { pen: 'crosshair', eraser: 'cell', select: 'default', line: 'crosshair', rect: 'crosshair', circle: 'crosshair', placeholder: 'crosshair' };

        // --- Toast ---
        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast ' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 1800);
        }

        // --- Statusbar ---
        function updateStatus() {
            const names = { pen: '✏️ Pen', eraser: '🧹 Eraser', select: '🔲 Select', line: '📏 Line', rect: '⬜ Rect', circle: '⭕ Circle', placeholder: '📍 Point' };
            document.getElementById('statusTool').textContent = names[tool] || tool;
            document.getElementById('statusInfo').textContent = '📦 ' + shapes.length + ' Shape' + (shapes.length !== 1 ? 's' : '');

            const scaleEl = document.getElementById('statusScale');
            if (selectedIdx !== -1) {
                const s = shapes[selectedIdx];
                const pct = Math.round((s.scale || 1) * 100);
                scaleEl.textContent = '🔍 ' + pct + '%';
                scaleEl.style.display = 'inline-flex';
            } else {
                scaleEl.style.display = 'none';
            }
        }
        function updateCoords(x, y) { document.getElementById('statusCoords').textContent = '📐 ' + Math.round(x) + ', ' + Math.round(y); }
        function setStatusMsg(msg, ok) {
            document.getElementById('statusMsg').textContent = msg;
            document.getElementById('statusDot').className = 'dot' + (ok ? ' ok' : '');
        }

        // --- Render ---
        function render() {
            ctx.fillStyle = "#ccc"; ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.drawImage(rasterCanvas, 0, 0);
            ctx.lineWidth = 2;

            shapes.forEach((s, idx) => {
                ctx.save();
                const c = getCenter(s);
                if (s.rotation) { ctx.translate(c.x, c.y); ctx.rotate(s.rotation); ctx.translate(-c.x, -c.y); }

                if (s.type === 'image') {
                    try { ctx.drawImage(s.data, s.x, s.y, s.width, s.height); } catch (e) { }
                    if (idx === selectedIdx) {
                        ctx.strokeStyle = "dodgerblue"; ctx.setLineDash([5, 5]); ctx.lineWidth = 1;
                        ctx.strokeRect(s.x - 1, s.y - 1, s.width + 2, s.height + 2);
                    }
                } else {
                    ctx.beginPath();
                    ctx.strokeStyle = (idx === selectedIdx) ? "dodgerblue" : "limegreen";
                    if (idx === selectedIdx) ctx.setLineDash([5, 5]); else ctx.setLineDash([]);
                    drawShapePath(ctx, s); ctx.stroke();
                    if (idx === selectedIdx) {
                        ctx.fillStyle = "dodgerblue"; ctx.fillRect(c.x - 3, c.y - 3, 6, 6);
                        if (s.type !== 'point') {
                            ctx.fillStyle = "#ff4444";
                            ctx.fillRect(s.x1 - 4, s.y1 - 4, 8, 8);
                            ctx.fillRect(s.x2 - 4, s.y2 - 4, 8, 8);
                        }
                    }
                }
                ctx.restore();
            });

            if (tool === 'select' && marqDrag) {
                ctx.save(); ctx.strokeStyle = "dodgerblue"; ctx.setLineDash([3, 3]); ctx.lineWidth = 1;
                ctx.strokeRect(startPos.x, startPos.y, lastPos.x - startPos.x, lastPos.y - startPos.y);
                ctx.restore();
            } else if (painting && isCreateTool(tool)) {
                ctx.save(); ctx.strokeStyle = "red"; ctx.lineWidth = 1;
                const s = createShapeObj(tool, startPos, lastPos);
                ctx.beginPath(); drawShapePath(ctx, s); ctx.stroke(); ctx.restore();
            }
            updateStatus();
        }

        function isCreateTool(t) { return ['line', 'rect', 'circle', 'placeholder'].includes(t); }
        function createShapeObj(type, p1, p2) { return { type: type === 'placeholder' ? 'point' : type, x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, rotation: 0, scale: 1 }; }
        function getCenter(s) {
            if (s.type === 'point') return { x: s.x1, y: s.y1 };
            if (s.type === 'image') return { x: s.x + s.width / 2, y: s.y + s.height / 2 };
            return { x: (s.x1 + s.x2) / 2, y: (s.y1 + s.y2) / 2 };
        }
        function drawShapePath(c, s) {
            if (s.type === 'line') { c.moveTo(s.x1, s.y1); c.lineTo(s.x2, s.y2); }
            else if (s.type === 'rect') { c.rect(s.x1, s.y1, s.x2 - s.x1, s.y2 - s.y1); }
            else if (s.type === 'circle') { c.arc(s.x1, s.y1, Math.sqrt((s.x2 - s.x1) ** 2 + (s.y2 - s.y1) ** 2), 0, 2 * Math.PI); }
            else if (s.type === 'point') {
                c.moveTo(s.x1 - 5, s.y1); c.lineTo(s.x1 + 5, s.y1);
                c.moveTo(s.x1, s.y1 - 5); c.lineTo(s.x1, s.y1 + 5);
                c.font = "10px monospace"; c.fillStyle = "#ff4444";
                c.fillText('(' + Math.round(s.x1) + ',' + Math.round(s.y1) + ')', s.x1 + 7, s.y1 - 5);
            }
        }


        // --- Tool Selection ---
        function setTool(t) {
            if (tool === 'select' && selectedIdx !== -1) selectedIdx = -1;
            tool = t;
            document.querySelectorAll('#toolsBar button').forEach(b => b.classList.remove('active'));
            const b = document.getElementById('btn' + t.charAt(0).toUpperCase() + t.slice(1));
            if (b) b.classList.add('active');
            document.getElementById('editBar').style.display = (t === 'select') ? 'flex' : 'none';
            canvas.style.cursor = cursors[t] || 'crosshair';
            render();
        }

        // --- Mouse Events ---
        canvas.addEventListener('mousedown', e => {
            if (e.button !== 0) return;
            const pos = getPos(e); startPos = pos; lastPos = pos;
            if (tool === 'select') {
                if (selectedIdx !== -1) {
                    const s = shapes[selectedIdx];
                    if (s.type !== 'image' && s.type !== 'point') {
                        if (Math.abs(pos.x - s.x1) < 10 && Math.abs(pos.y - s.y1) < 10) { dragHandle = 'start'; dragging = true; canvas.style.cursor = 'grab'; return; }
                        if (Math.abs(pos.x - s.x2) < 10 && Math.abs(pos.y - s.y2) < 10) { dragHandle = 'end'; dragging = true; canvas.style.cursor = 'grab'; return; }
                    }
                }
                dragHandle = null;
                const hit = hitTest(pos);
                if (hit !== -1) { selectedIdx = hit; dragging = true; canvas.style.cursor = 'move'; render(); }
                else { selectedIdx = -1; marqDrag = true; render(); }
            } else {
                painting = true; saveRasterState();
                if (tool === 'pen' || tool === 'eraser') { rCtx.beginPath(); rCtx.moveTo(pos.x, pos.y); }
            }
        });

        canvas.addEventListener('mousemove', e => {
            const pos = getPos(e), dx = pos.x - lastPos.x, dy = pos.y - lastPos.y;
            lastPos = pos; updateCoords(pos.x, pos.y);
            if (tool === 'select') {
                if (dragging && selectedIdx !== -1) {
                    const s = shapes[selectedIdx];
                    if (dragHandle === 'start') { s.x1 += dx; s.y1 += dy; }
                    else if (dragHandle === 'end') { s.x2 += dx; s.y2 += dy; }
                    else { if (s.type === 'image') { s.x += dx; s.y += dy; } else { s.x1 += dx; s.y1 += dy; s.x2 += dx; s.y2 += dy; } }
                    render();
                } else if (marqDrag) { render(); }
                else {
                    if (selectedIdx !== -1) {
                        const s = shapes[selectedIdx];
                        if (s.type !== 'image' && s.type !== 'point') {
                            if ((Math.abs(pos.x - s.x1) < 10 && Math.abs(pos.y - s.y1) < 10) || (Math.abs(pos.x - s.x2) < 10 && Math.abs(pos.y - s.y2) < 10)) { canvas.style.cursor = 'grab'; return; }
                        }
                    }
                    canvas.style.cursor = hitTest(pos) !== -1 ? 'move' : 'default';
                }
            } else if (painting) {
                if (tool === 'pen') {
                    rCtx.lineWidth = 2; rCtx.lineCap = 'round'; rCtx.strokeStyle = 'black';
                    rCtx.lineTo(pos.x, pos.y); rCtx.stroke(); rCtx.beginPath(); rCtx.moveTo(pos.x, pos.y); render();
                } else if (tool === 'eraser') {
                    rCtx.lineWidth = 15; rCtx.lineCap = 'round'; rCtx.strokeStyle = 'white';
                    rCtx.lineTo(pos.x, pos.y); rCtx.stroke(); rCtx.beginPath(); rCtx.moveTo(pos.x, pos.y); render();
                } else { render(); }
            }
        });

        canvas.addEventListener('mouseup', e => {
            if (tool === 'select') {
                if (dragging) { dragging = false; canvas.style.cursor = 'default'; checkSend(); }
                else if (marqDrag) {
                    marqDrag = false;
                    const w = lastPos.x - startPos.x, h = lastPos.y - startPos.y;
                    if (Math.abs(w) > 5 && Math.abs(h) > 5) { liftPixels(Math.min(startPos.x, lastPos.x), Math.min(startPos.y, lastPos.y), Math.abs(w), Math.abs(h)); showToast('Pixel angehoben', 'info'); }
                    render();
                }
            } else if (painting) {
                painting = false;
                if (isCreateTool(tool)) { shapes.push(createShapeObj(tool, startPos, lastPos)); render(); }
                checkSend();
            }
        });

        canvas.addEventListener('mouseleave', () => updateCoords('-', '-'));
        function getPos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }

        function hitTest(p) {
            for (let i = shapes.length - 1; i >= 0; i--) {
                const s = shapes[i];
                if (s.type === 'image') { if (p.x >= s.x && p.x <= s.x + s.width && p.y >= s.y && p.y <= s.y + s.height) return i; }
                else { if (p.x >= Math.min(s.x1, s.x2) - 5 && p.x <= Math.max(s.x1, s.x2) + 5 && p.y >= Math.min(s.y1, s.y2) - 5 && p.y <= Math.max(s.y1, s.y2) + 5) return i; }
            }
            return -1;
        }

        // --- Keyboard ---
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteSelected(); }
            else if (e.ctrlKey && e.key === 'c') { e.preventDefault(); copySelected(); }
            else if (e.ctrlKey && e.key === 'x') { e.preventDefault(); cutSelected(); }
            else if (e.ctrlKey && e.key === 'v') { e.preventDefault(); pasteShape(); }
            else if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); moveSelected(-1, 0); }
            else if (e.key === 'ArrowRight') { e.preventDefault(); moveSelected(1, 0); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); moveSelected(0, -1); }
            else if (e.key === 'ArrowDown') { e.preventDefault(); moveSelected(0, 1); }
        });

        function moveSelected(dx, dy) {
            if (selectedIdx === -1) return;
            const s = shapes[selectedIdx];
            if (s.type === 'image') { s.x += dx; s.y += dy; } else { s.x1 += dx; s.y1 += dy; s.x2 += dx; s.y2 += dy; }
            render(); checkSend();
        }

        // --- Editing ---
        function liftPixels(x, y, w, h) {
            x = Math.max(0, Math.round(x)); y = Math.max(0, Math.round(y));
            w = Math.min(w, WIDTH - x); h = Math.min(h, HEIGHT - y);
            const idata = rCtx.getImageData(x, y, w, h);
            rCtx.fillStyle = "white"; rCtx.fillRect(x, y, w, h);
            const oc = document.createElement('canvas'); oc.width = w; oc.height = h;
            oc.getContext('2d').putImageData(idata, 0, 0);
            shapes.push({ type: 'image', x, y, width: w, height: h, rotation: 0, data: oc });
            selectedIdx = shapes.length - 1; checkSend();
        }

        function pixelateSelected() {
            if (selectedIdx === -1) return;
            const s = shapes[selectedIdx]; rCtx.save();
            const c = getCenter(s);
            if (s.rotation) { rCtx.translate(c.x, c.y); rCtx.rotate(s.rotation); rCtx.translate(-c.x, -c.y); }
            if (s.type === 'image') { rCtx.drawImage(s.data, s.x, s.y, s.width, s.height); }
            else { rCtx.beginPath(); rCtx.strokeStyle = "black"; rCtx.lineWidth = 2; drawShapePath(rCtx, s); rCtx.stroke(); }
            rCtx.restore();
            shapes.splice(selectedIdx, 1); selectedIdx = -1;
            showToast('Pixeliert ✓', 'success'); render(); checkSend();
        }

        function rotateSelected(deg) {
            if (selectedIdx === -1) return;
            const s = shapes[selectedIdx], rad = deg * Math.PI / 180;
            if (s.type === 'image') { s.rotation = (s.rotation || 0) + rad; }
            else {
                const c = getCenter(s);
                if (s.type === 'rect') {
                    const pts = [{ x: s.x1, y: s.y1 }, { x: s.x2, y: s.y1 }, { x: s.x2, y: s.y2 }, { x: s.x1, y: s.y2 }];
                    const rPts = pts.map(p => rotatePoint(p.x, p.y, c.x, c.y, rad));
                    shapes.splice(selectedIdx, 1);
                    for (let i = 0; i < 4; i++) { const a = rPts[i], b = rPts[(i + 1) % 4]; shapes.push({ type: 'line', x1: a.x, y1: a.y, x2: b.x, y2: b.y, rotation: 0 }); }
                    selectedIdx = -1; showToast('Rect → 4 Linien', 'info');
                } else if (s.type === 'line') {
                    const p1 = rotatePoint(s.x1, s.y1, c.x, c.y, rad), p2 = rotatePoint(s.x2, s.y2, c.x, c.y, rad);
                    s.x1 = p1.x; s.y1 = p1.y; s.x2 = p2.x; s.y2 = p2.y; s.rotation = 0;
                }
            }
            render(); checkSend();
        }
        function rotatePoint(px, py, cx, cy, a) {
            const cos = Math.cos(a), sin = Math.sin(a);
            return { x: cos * (px - cx) - sin * (py - cy) + cx, y: sin * (px - cx) + cos * (py - cy) + cy };
        }

        function scaleSelected(f) {
            if (selectedIdx === -1) return;
            const s = shapes[selectedIdx], c = getCenter(s);
            if (s.type === 'image') { const nw = s.width * f, nh = s.height * f; s.x = c.x - nw / 2; s.y = c.y - nh / 2; s.width = nw; s.height = nh; }
            else { s.x1 = c.x + (s.x1 - c.x) * f; s.y1 = c.y + (s.y1 - c.y) * f; s.x2 = c.x + (s.x2 - c.x) * f; s.y2 = c.y + (s.y2 - c.y) * f; }
            render(); checkSend();
        }

        function deleteSelected() { if (selectedIdx !== -1) { shapes.splice(selectedIdx, 1); selectedIdx = -1; render(); checkSend(); } }
        function copySelected() {
            if (selectedIdx === -1) return;
            const s = shapes[selectedIdx];
            if (s.type === 'image') { const nc = document.createElement('canvas'); nc.width = s.width; nc.height = s.height; nc.getContext('2d').drawImage(s.data, 0, 0); clipboard = { ...s, data: nc }; }
            else clipboard = { ...s };
            showToast('Kopiert ✓', 'info');
        }
        function cutSelected() { copySelected(); deleteSelected(); }
        function pasteShape() {
            if (!clipboard) return;
            const s = { ...clipboard };
            if (s.type === 'image') { const nc = document.createElement('canvas'); nc.width = s.width; nc.height = s.height; nc.getContext('2d').drawImage(s.data, 0, 0); s.data = nc; s.x += 20; s.y += 20; }
            else { s.x1 += 20; s.y1 += 20; s.x2 += 20; s.y2 += 20; }
            shapes.push(s); selectedIdx = shapes.length - 1; render(); checkSend();
            showToast('Eingefügt ✓', 'info');
        }

        // --- Send (Throttled) ---
        let _sendTimer = null, _sending = false;
        function checkSend() {
            if (!document.getElementById('chkAutoSend').checked) return;
            clearTimeout(_sendTimer);
            _sendTimer = setTimeout(() => { if (!_sending) uploadToDevice(); }, 2000);
        }

        function saveRasterState() { if (rasterHistory.length > 5) rasterHistory.shift(); rasterHistory.push(rCtx.getImageData(0, 0, WIDTH, HEIGHT)); }
        function undo() {
            if (shapes.length > 0) { shapes.pop(); selectedIdx = -1; render(); checkSend(); }
            else if (rasterHistory.length > 0) { rCtx.putImageData(rasterHistory.pop(), 0, 0); render(); checkSend(); }
        }
        function clearAll() {
            if (!confirm("Alles löschen?")) return;
            saveRasterState(); rCtx.fillStyle = "white"; rCtx.fillRect(0, 0, WIDTH, HEIGHT);
            shapes = []; selectedIdx = -1; render(); checkSend();
        }

        function handleImageUpload(input) {
            if (!input.files || !input.files[0]) return;
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const cv = document.createElement('canvas'); cv.width = img.width; cv.height = img.height;
                    cv.getContext('2d').drawImage(img, 0, 0);
                    shapes.push({ type: 'image', x: WIDTH / 2 - img.width / 2, y: HEIGHT / 2 - img.height / 2, width: img.width, height: img.height, rotation: 0, data: cv });
                    selectedIdx = shapes.length - 1; render(); checkSend();
                    showToast('Bild geladen ✓', 'success');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        // --- VLSB Upload (180° rotated, no-cors) ---
        function uploadToDevice() {
            if (_sending) return;
            _sending = true;
            render();
            const btn = document.getElementById('btnSend');
            btn.classList.add('sending');
            setStatusMsg('Sende...', false);

            const idata = ctx.getImageData(0, 0, WIDTH, HEIGHT), data = idata.data;
            const buffer = new Uint8Array((HEIGHT / 8) * WIDTH);
            let bufIdx = 0;
            for (let page = 0; page < HEIGHT / 8; page++) {
                for (let x = 0; x < WIDTH; x++) {
                    let byte = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        const y = page * 8 + bit;
                        const srcX = WIDTH - 1 - x, srcY = HEIGHT - 1 - y;
                        const idx = (srcY * WIDTH + srcX) * 4;
                        if (data[idx] > 128) byte |= (1 << bit);
                    }
                    buffer[bufIdx++] = byte;
                }
            }
            const ip = document.getElementById('deviceIp').value;

            // AbortController mit 15s Timeout
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);

            // no-cors erlaubt fetch von file:// URLs (Antwort ist opaque)
            fetch('http://' + ip + '/upload', { method: 'POST', body: buffer, mode: 'no-cors', signal: controller.signal })
                .then(res => {
                    clearTimeout(timeoutId);
                    // no-cors: response.type === 'opaque', status ist immer 0
                    // Wir nehmen an: wenn kein Netzwerk-Fehler -> Erfolg
                    setStatusMsg('Gesendet ✓', true);
                    showToast('Gesendet ✓', 'success');
                })
                .catch(err => {
                    clearTimeout(timeoutId);
                    console.error(err);
                    if (err.name === 'AbortError') {
                        setStatusMsg('Timeout (15s)', false);
                        showToast('Timeout - Pico antwortet nicht', 'error');
                    } else {
                        setStatusMsg('Netzwerk-Fehler', false);
                        showToast('Verbindung fehlgeschlagen', 'error');
                    }
                })
                .finally(() => { _sending = false; btn.classList.remove('sending'); });
        }

        // --- Python Export ---
        function downloadPy() {
            let py = "import framebuf\n\ndef draw(buffer):\n", warning = false;
            shapes.forEach(s => {
                if (s.type === 'image') { warning = true; return; }
                if (s.type === 'rect') py += `    buffer.rect(${Math.round(s.x1)}, ${Math.round(s.y1)}, ${Math.round(s.x2 - s.x1)}, ${Math.round(s.y2 - s.y1)}, 0)\n`;
                else if (s.type === 'line') py += `    buffer.line(${Math.round(s.x1)}, ${Math.round(s.y1)}, ${Math.round(s.x2)}, ${Math.round(s.y2)}, 0)\n`;
                else if (s.type === 'circle') { const r = Math.round(Math.sqrt((s.x2 - s.x1) ** 2 + (s.y2 - s.y1) ** 2)), c = getCenter(s); py += `    # Circle: center(${Math.round(c.x)},${Math.round(c.y)}) radius ${r}\n`; }
                else if (s.type === 'point') py += `    # Point: ${Math.round(s.x1)}, ${Math.round(s.y1)}\n`;
            });
            if (warning) py += "\n# Warning: Pixel-Bilder können nicht als Vektor exportiert werden.\n";
            const blob = new Blob([py], { type: 'text/plain' }), a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = 'layout.py'; a.click();
            showToast('layout.py ✓', 'success');
        }

        // --- Init ---
        setStatusMsg('Bereit', true);
        render();
    </script>
</body>
